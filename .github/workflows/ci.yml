# CI — หอมฉลุย (Powered by 2T9COME)
# Lint · typecheck · test · build on every push/PR. See docs/DEPLOYMENT.md.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @homchalui/db generate
        continue-on-error: true

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          NEXT_PUBLIC_DEFAULT_LOCALE: th
          NEXT_PUBLIC_SUPPORTED_LOCALES: th,en,zh
          DATABASE_URL: postgresql://user:pass@localhost:5432/homchalui
          REDIS_URL: redis://localhost:6379
          NEXTAUTH_SECRET: ci-placeholder-secret-please-change
